name: InnuirBP
options:
  bundleIdPrefix: com.innuir
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
targets:
  InnuirBP:
    type: application
    platform: iOS
    sources:
      - path: InnuirBP
        excludes: ["*.plist", "*.entitlements", "Resources"]
    resources:
      - path: InnuirBP/Resources
        type: folder
    dependencies:
      - target: InnuirBPWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.innuir.bp
        DEVELOPMENT_TEAM: Y74C67CGY4
        INFOPLIST_FILE: InnuirBP/Info.plist
        CODE_SIGN_ENTITLEMENTS: InnuirBP/InnuirBP.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: InnuirBP/InnuirBP-Bridging-Header.h
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        PROVISIONING_PROFILE_SPECIFIER: "InnuirBP HealthKit Dev"
        # UIBackgroundModes: [fetch]  # Uncomment when background HealthKit delivery is implemented
    entitlements:
      path: InnuirBP/InnuirBP.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups: [group.com.innuir.bp]
    capabilities:
      HealthKit: {}
      App Groups:
        groups: [group.com.innuir.bp]

  InnuirBPWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: InnuirBPWidget
        excludes: ["*.plist", "*.entitlements"]
      - path: InnuirBP/Shared/BPReadingSnapshot.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.innuir.bp.widget
        DEVELOPMENT_TEAM: Y74C67CGY4
        INFOPLIST_FILE: InnuirBPWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: InnuirBPWidget/InnuirBPWidget.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Blood Pressure"
        SKIP_INSTALL: YES
    entitlements:
      path: InnuirBPWidget/InnuirBPWidget.entitlements
      properties:
        com.apple.security.application-groups: [group.com.innuir.bp]
    capabilities:
      App Groups:
        groups: [group.com.innuir.bp]
